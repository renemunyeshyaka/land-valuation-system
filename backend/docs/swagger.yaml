            $ref: '#/definitions/utils.APIResponse'
      summary: Calculate property valuation
      tags:
      - valuations
  /api/v1/valuations/{id}:
    get:
      description: Retrieve a specific valuation result by ID
      parameters:
      - description: Valuation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.ValuationResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Get valuation by ID
      tags:
      - valuations
  /api/v1/valuations/history:
    get:
      description: Retrieve all valuations performed on a specific property
      parameters:
      - description: Property ID
        in: query
        name: property_id
        required: true
        type: string
      - default: 10
        description: Maximum number of records
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handlers.ValuationResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
