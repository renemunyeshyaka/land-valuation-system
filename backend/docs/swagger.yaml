  /payments/callback:
    post:
      consumes:
      - application/json
      description: Process payment provider callbacks (webhook)
      parameters:
      - description: Payment provider (mtn|airtel)
        in: query
        name: provider
        required: true
        type: string
      - description: Callback payload
        in: body
        name: payload
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Callback processed
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Invalid callback
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Handle payment callback
      tags:
      - payments
  /payments/mobile-money:
    post:
      consumes:
      - application/json
      description: Initiate a payment via MTN or Airtel mobile money with validation
      parameters:
      - description: Payment request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.MobileMoneyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Payment initiated
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Invalid request or validation failed
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Initiate mobile money payment
      tags:
      - payments
