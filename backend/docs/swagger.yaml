basePath: /api/v1
definitions:
  handlers.CreateValuationRequest:
    properties:
      district:
        type: string
      include_comparables:
        type: boolean
      include_factors:
        type: boolean
      property_size_sqm:
        type: number
      property_type:
        enum:
        - residential
        - commercial
        - agricultural
        - industrial
        type: string
      sector:
        type: string
    required:
    - district
    - property_size_sqm
    - property_type
    type: object
  handlers.MobileMoneyRequest:
    properties:
      amount:
        example: 50000
        type: number
      description:
        example: Property payment
        type: string
      phone_number:
        example: "+250788123456"
        type: string
      provider:
        enum:
        - mtn
        - airtel
        example: mtn
        type: string
    required:
    - amount
    - phone_number
    - provider
    type: object
  handlers.PropertySearchRequest:
    properties:
      district:
        example: Kigali
        type: string
      latitude:
        example: -1.9536
        type: number
      longitude:
        example: 29.8739
        type: number
      max_price:
        example: 10000000
        type: number
      max_size:
        example: 1000
        type: number
      min_price:
        example: 1000000
        type: number
      min_size:
        example: 100
        type: number
      page:
        example: 1
        type: integer
      page_size:
        example: 50
        type: integer
      property_type:
        example: residential
        type: string
      radius:
        example: 5000
        type: number
      sort_by:
        example: created_at
        type: string
      sort_order:
        example: desc
        type: string
    required:
    - latitude
    - longitude
    type: object
  handlers.PropertySummary:
    properties:
      district:
        type: string
      id:
        type: integer
      land_size:
        type: number
      price:
        type: number
      property_type:
        type: string
      sector:
        type: string
      title:
        type: string
    type: object
  handlers.SubmitKYCRequest:
    properties:
      document_type:
        enum:
        - national_id
        - birth_certificate
        - passport
        - driver_license
        example: national_id
        type: string
      document_url:
        example: https://example.com/doc.pdf
        type: string
      first_name:
        example: John
        minLength: 2
        type: string
      last_name:
        example: Doe
        minLength: 2
        type: string
      national_id:
        example: 1ABCDE1234567890
        maxLength: 30
        minLength: 6
        type: string
    required:
    - document_type
    - document_url
    - first_name
    - last_name
    - national_id
    type: object
  handlers.ValuationResponse:
    properties:
      adjustments:
        additionalProperties:
          format: float64
          type: number
        type: object
      base_price:
        type: number
      comparables:
        items:
          $ref: '#/definitions/handlers.PropertySummary'
        type: array
      confidence:
        type: number
      confidence_level:
        type: string
      estimated_value_rwf:
        type: number
      factors:
        items:
          $ref: '#/definitions/models.ValuationFactor'
        type: array
      gazette_reference:
        type: string
      recommendations:
        items:
          type: string
        type: array
      updated_at:
        type: string
      zone_coefficient:
        type: number
    type: object
  handlers.VerifyKYCRequest:
    properties:
      comment:
        example: All documents verified successfully
        maxLength: 500
        type: string
      reason:
        example: Invalid national ID format
        type: string
      status:
        enum:
        - approved
        - rejected
        - pending
        example: approved
        type: string
    required:
    - status
    type: object
  models.ValuationFactor:
    properties:
      description:
        type: string
      impact:
        description: positive, negative, neutral
        type: string
      name:
        type: string
      value:
        type: number
      weight:
        type: number
    type: object
  utils.APIError:
    properties:
      details:
        type: string
      message:
        type: string
    type: object
  utils.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/utils.APIError'
      message:
        type: string
      success:
        type: boolean
    type: object
host: api.landvaluationsystem.rw
info:
  contact:
    email: support@landvaluationsystem.rw
    name: API Support
    url: http://www.landvaluationsystem.rw/support
  description: Rwanda Land Valuation System with Official Gazette Integration
  license:
    name: Proprietary
    url: http://www.landvaluationsystem.rw/license
  termsOfService: http://swagger.io/terms/
  title: Land Valuation System API
  version: "1.0"
paths:
  /admin/audit-logs:
    get:
      responses: {}
  /admin/config:
    get:
      responses: {}
    put:
      responses: {}
  /admin/content/{id}/moderate:
    post:
      responses: {}
  /admin/health:
