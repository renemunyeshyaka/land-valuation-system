  /api/v1/exchange-rate:
    get:
      consumes:
      - application/json
      description: Returns live exchange rate information for USD and RWF
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get current USD/RWF exchange rate
      tags:
      - currency
  /api/v1/exchange-rate/convert:
    get:
      consumes:
      - application/json
      description: Convert an amount from one currency to another
      parameters:
      - description: Amount to convert
        in: query
        name: amount
        required: true
        type: number
      - description: Source currency (USD or RWF)
        in: query
        name: from
        required: true
        type: string
      - description: Target currency (USD or RWF)
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Convert between USD and RWF
      tags:
      - currency
  /api/v1/exchange-rate/refresh:
    post:
      consumes:
      - application/json
      description: Force refresh of the cached exchange rate
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Refresh exchange rate cache
      tags:
      - currency
  /api/v1/properties:
    get:
      responses: {}
    post:
      responses: {}
  /api/v1/properties/{id}:
    delete:
      responses: {}
    get:
      responses: {}
    put:
      responses: {}
  /api/v1/properties/search:
    post:
      consumes:
      - application/json
      description: Search for properties near a location with optional filters for
        price, type, and district
      parameters:
      - description: Search filters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.PropertySearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Properties found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Search properties by location and filters
      tags:
      - properties
  /api/v1/properties/stats:
    get:
      responses: {}
  /api/v1/valuations:
    get:
      description: Get a list of all valuations created by the authenticated user
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handlers.ValuationResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: List user's valuations
      tags:
      - valuations
    post:
      consumes:
      - application/json
      description: Calculate estimated property value based on location, size, and
        type
      parameters:
      - description: Valuation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateValuationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.ValuationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Calculate property valuation
      tags:
      - valuations
  /api/v1/valuations/{id}:
    get:
      description: Retrieve a specific valuation result by ID
      parameters:
      - description: Valuation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.ValuationResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Get valuation by ID
      tags:
      - valuations
