          $ref: '#/definitions/handlers.VerifyKYCRequest'
      produces:
      - application/json
      responses:
        "200":
          description: KYC verified
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Invalid request or validation failed
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "403":
          description: Forbidden - Admin access required
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: User or KYC not found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Verify user KYC (Admin)
      tags:
      - admin
  /admin/valuations/{id}/approve:
    post:
      consumes:
      - application/json
      description: Admin endpoint to approve a property valuation
