  /admin/users/{id}/reactivate:
    post:
      responses: {}
  /admin/users/{id}/suspend:
    post:
      responses: {}
  /admin/users/{id}/verify-kyc:
    post:
      consumes:
      - application/json
      description: Approve or reject the KYC verification submitted by a user (admin
        only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: KYC verification decision
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.VerifyKYCRequest'
      produces:
      - application/json
      responses:
        "200":
          description: KYC verified
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Invalid request or validation failed
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "403":
          description: Forbidden - Admin access required
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: User or KYC not found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Verify user KYC (Admin)
      tags:
      - admin
  /analytics/activity-report:
    get:
      responses: {}
  /analytics/dashboard:
    get:
