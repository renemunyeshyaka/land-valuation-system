          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Approve a valuation (Admin)
      tags:
      - admin
      - valuations
  /admin/valuations/{id}/reject:
    post:
      consumes:
      - application/json
