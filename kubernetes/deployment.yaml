apiVersion: apps/v1
kind: Deployment
metadata:
  name: land-valuation-backend
  namespace: land-valuation
spec:
  replicas: 3
  selector:
    matchLabels:
      app: land-valuation-backend
  template:
    metadata:
      labels:
        app: land-valuation-backend
    spec:
      containers:
      - name: backend
        image: land-valuation-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: land-valuation-backend-service
  namespace: land-valuation
spec:
  selector:
    app: land-valuation-backend
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: land-valuation-backend-hpa
  namespace: land-valuation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: land-valuation-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80