name: Backend Tests & Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

env:
  GO_VERSION: '1.21'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: land_valuation_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Run migrations
      working-directory: backend
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/land_valuation_test?sslmode=disable
      run: |
        psql $DATABASE_URL < migrations/001_init_schema.sql

    - name: Validate auth env template
      working-directory: backend
      run: |
        chmod +x preflight_auth_env.sh
        ./preflight_auth_env.sh .env.production.example --template
    
    - name: Run focused authz regression suite
      working-directory: backend
      run: |
        go test ./internal/api/middleware ./internal/api/handlers ./internal/services ./internal/api/routes ./internal/repository -run 'MarketplaceService_|FunctionalReadPaths|CreateValidationAndSuccess|PublicPayloadContract|PaginationEdgeCases|SubscriptionPlansRoute|SubscriptionBillingHistoryRoute|AdminUsersListRoute|GetPlans|SearchNearby|SearchNearby_RejectsEmptyCriteria|GetSearchAnalytics|GetHeatmap|AnalyticsSearchRoute|AnalyticsHeatmapRoute|SyncPropertyWithMarketplaces|SyncMarketplaceAPIs|GetPropertyListingsOnSale|SearchProperties|SearchPropertiesPaginated|FindByUPIPaginated|AuthRequired|GetUserIDFromContext|PropertyUpdateRoute|PropertyDeleteRoute|MarketplaceSyncRoute|ProtectedRoutes_RequireAuthorizationHeader|ProtectedRoutes_RequireValidBearerFormat'

    - name: Run tests
      working-directory: backend
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/land_valuation_test?sslmode=disable
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.out
        flags: unittests
        name: codecov-umbrella
    
    - name: Run linters
      working-directory: backend
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        golangci-lint run ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Build
      working-directory: backend
      run: |
        go build -o api ./cmd/api
        go build -o migrator ./cmd/migrator/main.go
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: binaries
        path: |
          backend/api
          backend/migrator

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: land-valuation:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
