name: Mobile Android Release

on:
  workflow_dispatch:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-android-release.yml"

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: mobile
    env:
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.17-10/x64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required signing secrets (fail fast)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          missing=0
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS; do
            if [[ -z "${!key}" ]]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Verify npm lockfile exists
        run: test -f package-lock.json

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install mobile dependencies
        run: npm ci --legacy-peer-deps

      - name: Regenerate Android native project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Ensure SDK path in local.properties
        run: |
          mkdir -p android
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Materialize release keystore from secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          # Strip accidental whitespace/newlines from pasted secret before decoding.
          if ! printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 --decode > android/app/release.keystore; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not valid base64. Recopy the full one-line base64 value without quotes."
            exit 1
          fi

          if [[ ! -s android/app/release.keystore ]]; then
            echo "::error::Decoded keystore is empty. Check ANDROID_KEYSTORE_BASE64."
            exit 1
          fi

      - name: Validate keystore credentials before Gradle
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          KEYSTORE_PATH="android/app/release.keystore"

          if ! keytool -list -storetype PKCS12 -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "::error::Keystore cannot be opened with ANDROID_KEYSTORE_PASSWORD. Ensure ANDROID_KEYSTORE_BASE64 and ANDROID_KEYSTORE_PASSWORD come from the same keystore file."
            exit 1
          fi

          if ! keytool -list -storetype PKCS12 -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::Alias '$ANDROID_KEY_ALIAS' not found in keystore. Update ANDROID_KEY_ALIAS."
            exit 1
          fi

          if ! keytool -certreq -storetype PKCS12 -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" -keypass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" -file /tmp/android-signing-check.csr >/dev/null 2>&1; then
            echo "::error::Private key decryption failed. For PKCS12, use the same password for key and store."
            exit 1
          fi

          rm -f /tmp/android-signing-check.csr

      - name: Build signed release AAB (strict signing)
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/mobile/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          # PKCS12 keystores use the same password for store and key entry.
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease -Pandroid.allowDebugSigningForRelease=false

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
