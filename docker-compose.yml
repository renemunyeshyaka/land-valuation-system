version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: land_valuation_db
    environment:
      POSTGRES_DB: land_valuation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - land_valuation_network

  redis:
    image: redis:7-alpine
    container_name: land_valuation_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - land_valuation_network

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: land_valuation_es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - land_valuation_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: land_valuation_backend
    environment:
      - ENVIRONMENT=development
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=land_valuation
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - elasticsearch
    volumes:
      - ./backend:/app
      - /app/tmp
    networks:
      - land_valuation_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: land_valuation_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_MAPBOX_TOKEN=${MAPBOX_TOKEN}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - land_valuation_network

  nginx:
    image: nginx:alpine
    container_name: land_valuation_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - land_valuation_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: land_valuation_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@landvaluationsystem.rw
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - land_valuation_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: land_valuation_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - land_valuation_network

  kibana:
    image: kibana:8.11.0
    container_name: land_valuation_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - land_valuation_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  land_valuation_network:
    driver: bridge